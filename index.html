<!DOCTYPE html>
<html>
<body style="background-color:darkslategray;">
<h1 style="font-size:60px; font-family:arial; text-align:center; color:white;">Geopolitics</h1>
<p style="font-size:40px; font-family:arial; text-align:center; color:white;">Upload presentation</p>
<hr>
<form target="presentationframe" autocomplete="on">
<label id="label" for="presentation" style="color:white;">Upload file:</label>
<input type="url" id="presentation" name="presentation" target="presentationframe" onchange="openFile()"><br>
</form>
<p><a id="presentationlink" href="" target="presentationframe" style="color:white;">Click here to open presentation after inserting link above</a></p>
<br><br>
<iframe src="" id="presentationframe" height="569" width="960" name="presentationframe"></iframe>
<script>
const button=document.getElementById("submit");
const iframe=document.getElementById("presentationlink");
const input=document.getElementById("presentation");
function openFile() {
	iframe.href=input.value;
}
</script>
</body>
</html>
<title>Geopolitics w/ Timer WIP</title>
